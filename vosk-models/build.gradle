plugins {
    id 'com.android.library'
}

android {
    namespace 'com.esc.models'
    compileSdk 36

    defaultConfig {
        minSdk 24
        targetSdk 36
    }

    buildFeatures {
        buildConfig = false
    }

    sourceSets {
        main {
            assets.srcDirs += "$buildDir/generated/assets"
        }
    }
}

tasks.register('genUUID') {
    def uuid = UUID.randomUUID().toString()
    def odir = file("$buildDir/generated/assets/model-es")
    def ofile = file("$odir/uuid")
    doLast {
        mkdir odir
        ofile.text = uuid
    }
}